<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pytania egzaminacyjne – Rzeczoznawca p.poż.</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f6f1;
    --surface: #ffffff;
    --border: #e2ddd6;
    --border-strong: #c8c2b8;
    --text: #1a1814;
    --text-muted: #6b6560;
    --accent: #c0392b;
    --accent-light: #fdf0ee;
    --radius: 6px;
  }
  body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }

  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 2.5rem; max-width: 400px; width: 100%; text-align: center; }
  .login-box .brand { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.4rem; }
  .login-box h1 { font-family: Georgia, serif; font-size: 22px; font-weight: normal; margin-bottom: 0.2rem; }
  .login-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; }
  .color-preview { width: 44px; height: 44px; border-radius: 50%; margin: 0 auto 1.25rem; border: 2px solid var(--border); transition: background 0.3s; }
  .login-box input { width: 100%; padding: 10px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: 15px; background: var(--bg); color: var(--text); margin-bottom: 1rem; outline: none; }
  .login-box input:focus { border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: white; border: none; padding: 10px 28px; border-radius: var(--radius); font-size: 14px; cursor: pointer; width: 100%; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  #app { display: none; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 54px; position: sticky; top: 0; z-index: 100; }
  header .logo { font-family: Georgia, serif; font-size: 14px; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; }
  .user-badge { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
  .user-dot { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; color: white; flex-shrink: 0; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #27ae60; flex-shrink: 0; }
  .sync-dot.off { background: #e74c3c; }

  main { max-width: 840px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.6rem 0.75rem; text-align: center; }
  .stat-card .num { font-family: Georgia, serif; font-size: 20px; color: var(--text); }
  .stat-card .lbl { font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; }

  .search-bar { width: 100%; padding: 9px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: 14px; background: var(--surface); color: var(--text); outline: none; margin-bottom: 1rem; }
  .search-bar:focus { border-color: var(--accent); }

  .section-header { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); padding-bottom: 0.6rem; margin: 1.5rem 0 0.75rem; border-bottom: 1px solid var(--border); }

  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
  .q-header { padding: 0.9rem 1.1rem; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; user-select: none; }
  .q-num { font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; flex-shrink: 0; padding-top: 2px; min-width: 24px; }
  .q-text { flex: 1; font-size: 13px; line-height: 1.65; }
  .q-chevron { flex-shrink: 0; font-size: 14px; color: var(--text-muted); transition: transform 0.2s; padding-top: 2px; }
  .q-card.open .q-chevron { transform: rotate(180deg); }

  .q-status-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 5px; }
  .answered-tag { font-size: 10px; padding: 1px 7px; border-radius: 10px; background: #e8f5e9; color: #2e7d32; font-weight: 600; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; cursor: help; }

  .q-body { display: none; border-top: 1px solid var(--border); padding: 1.1rem; }
  .q-card.open .q-body { display: block; }

  .answers-list { list-style: none; margin-bottom: 0.75rem; }
  .answers-list li { margin-bottom: 5px; }
  .answer-btn { width: 100%; text-align: left; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); font-size: 13px; color: var(--text); cursor: pointer; transition: border-color 0.15s, background 0.15s; line-height: 1.5; display: flex; align-items: flex-start; gap: 8px; }
  .answer-btn:hover { border-color: var(--border-strong); background: #f4f1ec; }
  .answer-btn.selected-mine { border-color: var(--accent); background: var(--accent-light); }
  .answer-letter { font-weight: 700; font-size: 10px; color: var(--text-muted); flex-shrink: 0; padding-top: 2px; min-width: 14px; }

  .vote-breakdown { display: none; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
  .vote-breakdown.visible { display: block; }
  .vote-breakdown h4 { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.6rem; }
  .vote-row { margin-bottom: 7px; }
  .vote-row-top { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
  .vote-lbl { font-size: 11px; font-weight: 700; color: var(--text); min-width: 16px; }
  .vote-bar-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .vote-bar { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s ease; }
  .vote-count { font-size: 10px; color: var(--text-muted); min-width: 50px; text-align: right; }
  .voter-dots { display: flex; gap: 3px; padding-left: 23px; flex-wrap: wrap; margin-top: 2px; }
  .voter-dot { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 700; color: white; cursor: default; }

  .comments-section { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
  .comments-section h4 { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.6rem; }
  .comment-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
  .comment-avatar { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: white; }
  .comment-bubble { background: var(--bg); border: 1px solid var(--border); border-radius: 0 5px 5px 5px; padding: 5px 10px; font-size: 12px; line-height: 1.5; flex: 1; }
  .comment-meta { font-size: 10px; color: var(--text-muted); margin-bottom: 1px; font-weight: 700; }
  .comment-input-row { display: flex; gap: 6px; margin-top: 6px; }
  .comment-input { flex: 1; padding: 6px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: 13px; color: var(--text); background: var(--bg); outline: none; resize: none; min-height: 34px; line-height: 1.4; }
  .comment-input:focus { border-color: var(--accent); }
  .btn-comment { background: var(--text); color: var(--bg); border: none; padding: 6px 12px; border-radius: var(--radius); font-size: 12px; cursor: pointer; white-space: nowrap; }
  .btn-comment:hover { opacity: 0.8; }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-muted); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="brand">Rzeczoznawca p.poż.</div>
    <h1>Pytania egzaminacyjne</h1>
    <p>Sesja 2024–2025 · Głosowanie grupowe</p>
    <div class="color-preview" id="color-preview"></div>
    <input type="text" id="name-input" placeholder="Twoje imię lub inicjały" maxlength="20" autocomplete="off" />
    <button class="btn-primary" id="login-btn" onclick="login()">Wejdź i głosuj</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">Egzamin Rzeczoznawcy</div>
    <div class="user-badge">
      <div class="sync-dot" id="sync-dot" title="Połączenie z bazą"></div>
      <span id="header-name"></span>
      <div class="user-dot" id="header-dot"></div>
    </div>
  </header>
  <main>
    <div class="stats-grid">
      <div class="stat-card"><div class="num" id="stat-total">0</div><div class="lbl">Pytań</div></div>
      <div class="stat-card"><div class="num" id="stat-answered">0</div><div class="lbl">Moje odp.</div></div>
      <div class="stat-card"><div class="num" id="stat-users">0</div><div class="lbl">Głosujących</div></div>
      <div class="stat-card"><div class="num" id="stat-comments">0</div><div class="lbl">Komentarzy</div></div>
    </div>
    <input type="text" class="search-bar" id="search" placeholder="🔍  Szukaj pytania..." oninput="filterQuestions()" />
    <div id="questions-container"></div>
  </main>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ── FIREBASE CONFIG ───────────────────────────────────────────────────────────
const firebaseConfig = {

// ── DANE ──────────────────────────────────────────────────────────────────────
const USER_COLORS = [
  '#c0392b','#2980b9','#27ae60','#8e44ad','#d35400',
  '#16a085','#e67e22','#2c3e50','#1abc9c','#e91e63',
  '#3f51b5','#009688','#ff5722','#607d8b','#f39c12'
];
const LETTERS = ['a','b','c','d','e'];

const QUESTIONS = [
  // 2025
  { year:'2025', text:'Nieizolowane termicznie i akustycznie elastyczne przewody wentylacyjne zastosowane jako elementy łączące do połączenia sztywnych przewodów wentylacyjnych z urządzeniami wentylacyjnymi innymi niż wentylatory, które posiadają długość 3 m, powinny być wykonane z materiałów co najmniej:', answers:['niepalnych','niezapalnych','trudno zapalnych'] },
  { year:'2025', text:'Zgodnie z PN-B 02877-4:2025-07, efektywna powierzchnia otworów napływu powietrza kompensacyjnego dostarczanego bezpośrednio z zewnątrz budynku do klatki schodowej w budynku średniowysokim, powinna być nie mniejsza niż:', answers:['łączna wymagana powierzchnia czynna oddymiania tej klatki schodowej','łączna powierzchnia geometryczna klap dymowych w tej klatce schodowej','130 % łącznej powierzchni czynnej oddymiania tej klatki schodowej'] },
  { year:'2025', text:'W jednokondygnacyjnym budynku magazynowym o gęstości obciążenia ogniowego powyżej 4000 MJ/m², wykonanym z elementów nierozprzestrzeniających ognia oraz wyposażonym w samoczynne urządzenia oddymiające, w miejscu połączenia stropu antresoli przeznaczonej do użytku powyżej 10 osób ze ścianą zewnętrzną:', answers:['wymagany jest pas międzykondygnacyjny o wysokości co najmniej 0,8 m','wymagany jest pas międzykondygnacyjny o wysokości co najmniej 1,2 m','pas międzykondygnacyjny nie jest wymagany'] },
  { year:'2025', text:'Do budynku magazynowego z największą strefą pożarową PM o powierzchni wewnętrznej 980 m² i całkowitej 1020 m² oraz gęstości obciążenia ogniowego 4000 MJ/m², bez pomieszczeń zagrożonych wybuchem, wymagane jest zapewnienie drogi pożarowej, która powinna umożliwiać przejazd pojazdów o nacisku osi na nawierzchnię jezdni co najmniej:', answers:['50 kN (kiloniutonów)','100 kN (kiloniutonów)','odpowiedzi w lit. a) i b) są nieprawidłowe, ponieważ budynek nie wymaga doprowadzenia drogi pożarowej'] },
  { year:'2025', text:'W budynku mieszkalnym wielorodzinnym posiadającym 10 kondygnacji nadziemnych, dopuszcza się w obrębie jednego lokalu mieszkalnego stosowanie przewodów wentylacyjnych o klasie reakcji na ogień co najmniej E, pod warunkiem zainstalowania w miejscu przejścia przewodów wentylacyjnych przez przegrody wydzielające lokal mieszkalny:', answers:['zabezpieczenia ogniochronnego o klasie odporności ogniowej co najmniej EI 60','przeciwpożarowej klapy odcinającej o klasie odporności ogniowej co najmniej EIS 60','odpowiedzi w lit. a) i b) są nieprawidłowe'] },
  { year:'2025', text:'W strefie pożarowej ZL III do wykończenia wnętrz pomieszczeń niestanowiących drogi komunikacji ogólnej, służącej celom ewakuacji, można stosować materiały o klasie reakcji na ogień i o wskaźniku toksykometrycznym (WLC50SM):', answers:['D-s2, d0; WLC50SM ≤ 15','D-s2, d0; 15 < WLC50SM ≤ 40','E-d2; WLC50SM > 40'] },
  { year:'2025', text:'Uzgodnienia pod względem zgodności z wymaganiami ochrony przeciwpożarowej nie wymaga projekt techniczny wchodzący w skład projektu budowlanego:', answers:['budynku niskiego (N) zawierającego strefę pożarową o powierzchni 1500 m², zakwalifikowaną do kategorii zagrożenia ludzi ZL III, obejmującą kondygnację nadziemną inną niż pierwsza','obiektu budowlanego innego niż budynek, przeznaczonego do użyteczności publicznej, w którym przewiduje się możliwość jednoczesnego przebywania w strefie pożarowej 80 osób na powierzchni 1800 m²','tunelu technologicznego o długości ponad 100 m nieprzeznaczonego do ruchu pojazdów lub pieszych'] },
  { year:'2025', text:'W strefie pożarowej z odpadami stałymi znajdującej się poza budynkiem, chronionej przez stałe samoczynne urządzenie gaśnicze wodne, maksymalna dopuszczalna powierzchnia sekcji magazynowej o gęstości obciążenia ogniowego 1000 MJ/m² wynosi:', answers:['600 m²','800 m²','1000 m²'] },
  { year:'2025', text:'Zgodnie z PKN-CEN/TS 54-14:2020, odległość punktowej czujki dymu od ściany pomieszczenia użytkowego nie może wynosić więcej niż:', answers:['3,2 m','4,4 m','6,4 m'] },

  { year:'2025', text:'W budynku hali sportowej o wysokości 14 m i jednej kondygnacji nadziemnej, w której może jednocześnie przebywać 100 osób niebędących jej stałymi użytkownikami, belki wykonane z drewna klejonego warstwowo, stanowiące konstrukcję dachu, powinny spełniać łącznie co najmniej następujące wymagania:', answers:['klasa odporności ogniowej R 30, wymiary przekroju poprzecznego 14 cm, klasa reakcji na ogień D-s1,d0','klasa odporności ogniowej R 15, wymiary przekroju poprzecznego 14 cm, klasa reakcji na ogień D-s1,d0','klasa odporności ogniowej R 30, wymiary przekroju poprzecznego 12 cm, klasa reakcji na ogień D-s2,d0'] },
  { year:'2025', text:'Liczba zbiorników podziemnych z gazem płynnym o pojemności 10 m³ każdy, służących do magazynowania gazu płynnego w stacji paliw płynnych, nie może być większa niż:', answers:['1','2','4'] },
  { year:'2025', text:'Zgodnie z PN-EN 13501-4:2016-07, klasyfikacja HOT 400/30 w przypadku ognioodpornej klapy odcinającej do wielostrefowych systemów kontroli rozprzestrzeniania się dymu oznacza, że:', answers:['przyrost temperatury po stronie nienagrzewanej jest nie większy niż 400°C','klapa odcinająca ma zdolność do wykonania 30 cykli otwierania i zamykania w warunkach oddziaływania temperatury niższej niż 400°C','klapa odcinająca ma zdolność do otwierania i zamykania przez 30 minut w warunkach oddziaływania temperatury niższej niż 400°C'] },
  { year:'2025', text:'Budynek tymczasowy średniowysoki (SW) stanowiący jedną strefę pożarową o powierzchni 2500 m², w którym przewiduje się możliwość jednoczesnego przebywania 60 osób niebędących jego stałymi użytkownikami, powinien być wyposażony w:', answers:['instalację wodociągową przeciwpożarową z hydrantami 25','instalację wodociągową przeciwpożarową z hydrantami 52','odpowiedzi w lit. a) i b) są nieprawidłowe'] },

  { year:'2025', text:'W budynku hotelu o wysokości 60 m:', answers:['dopuszcza się prowadzenie ewakuacji tylko do jednej klatki schodowej, jeżeli powierzchnia wewnętrzna kondygnacji nie przekracza 750 m²','dopuszcza się prowadzenie ewakuacji tylko do jednej klatki schodowej na kondygnacji stanowiącej odrębną strefę pożarową PM','należy zapewnić możliwość ewakuacji do co najmniej dwóch klatek schodowych'] },
  { year:'2025', text:'W dwukondygnacyjnym budynku produkcyjnym o wysokości 27 m, stanowiącym jedną strefę pożarową o gęstości obciążenia ogniowego 1800 MJ/m², w którym zastosowano stałe samoczynne urządzenia gaśnicze wodne oraz samoczynne urządzenia oddymiające, strop antresoli przeznaczonej do użytku 30 osób powinien mieć klasę odporności ogniowej co najmniej:', answers:['REI 15','REI 30','REI 60'] },
  { year:'2025', text:'W budynku biurowym wysokim (W), w którym każda kondygnacja o powierzchni wewnętrznej 1500 m² stanowi odrębną strefę pożarową, do zasilania w wodę instalacji wodociągowej przeciwpożarowej może być zastosowany zbiornik o pojemności 30 m³, w przypadku:', answers:['zapewnienia jego zasilania w wodę z zewnętrznej sieci wodociągowej przeciwpożarowej o wydajności nie mniejszej niż 10 dm³/s','zapewnienia jego zasilania w wodę z zewnętrznej sieci wodociągowej przeciwpożarowej o wydajności nie mniejszej niż 15 dm³/s','odpowiedzi w lit. a) i b) są nieprawidłowe – nie uwzględniają wymogu dotyczącego wyprowadzenia w elewacji budynku nasady o średnicy 75 mm'] },

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentUser = null;
let currentColor = null;
let unsubscribers = {};

function getUserColor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % USER_COLORS.length;
  return USER_COLORS[h];
}
function initials(name) {
  return name.split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
}
function qId(year, idx) { return year + '_' + idx; }

// ── LOGIN ─────────────────────────────────────────────────────────────────────
const nameInput = document.getElementById('name-input');
const colorPreview = document.getElementById('color-preview');
colorPreview.style.background = '#ccc';

nameInput.addEventListener('input', () => {
  const n = nameInput.value.trim();
  colorPreview.style.background = n ? getUserColor(n) : '#ccc';
});
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function login() {
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Łączenie...';

  currentUser = name;
  currentColor = getUserColor(name);

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('header-name').textContent = name;
  const hd = document.getElementById('header-dot');
  hd.style.background = currentColor;
  hd.textContent = initials(name);

  renderAll();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  document.getElementById('stat-total').textContent = QUESTIONS.length;

  const years = [...new Set(QUESTIONS.map(q=>q.year))].sort((a,b)=>b-a);
  let globalIdx = 0;

  years.forEach(year => {
    const qs = QUESTIONS.filter(q=>q.year===year);
    const sec = document.createElement('div');
    sec.className = 'section-header';
    sec.dataset.year = year;
    sec.textContent = `Sesja ${year} — ${qs.length} pytań`;
    container.appendChild(sec);

    qs.forEach((q, localIdx) => {
      globalIdx++;
      const id = qId(year, localIdx);
      const card = buildCard(q, id, globalIdx);
      card.dataset.year = year;
      card.dataset.text = q.text.toLowerCase();
      container.appendChild(card);
      subscribeToQuestion(id, q);
    });
  });
}

function buildCard(q, id, num) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = 'card-' + id;

  const header = document.createElement('div');
  header.className = 'q-header';
  header.onclick = () => card.classList.toggle('open');

  const numEl = document.createElement('div');
  numEl.className = 'q-num';
  numEl.textContent = String(num).padStart(2,'0');

  const textWrap = document.createElement('div');
  textWrap.style.flex = '1';
  const textEl = document.createElement('div');
  textEl.className = 'q-text';
  textEl.textContent = q.text;
  const statusRow = document.createElement('div');
  statusRow.className = 'q-status-row';
  statusRow.id = 'status-' + id;
  textWrap.appendChild(textEl);
  textWrap.appendChild(statusRow);

  const chevron = document.createElement('div');
  chevron.className = 'q-chevron';
  chevron.textContent = '▾';

  header.appendChild(numEl);
  header.appendChild(textWrap);
  header.appendChild(chevron);
  card.appendChild(header);

  const body = document.createElement('div');
  body.className = 'q-body';

  const ul = document.createElement('ul');
  ul.className = 'answers-list';
  q.answers.forEach((ans, idx) => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.dataset.idx = idx;
    btn.innerHTML = `<span class="answer-letter">${LETTERS[idx]})</span><span>${ans}</span>`;
    btn.onclick = () => castVote(id, idx, q);
    li.appendChild(btn);
    ul.appendChild(li);
  });
  body.appendChild(ul);

  const breakdown = document.createElement('div');
  breakdown.className = 'vote-breakdown';
  breakdown.id = 'breakdown-' + id;
  body.appendChild(breakdown);

  const commSec = document.createElement('div');
  commSec.className = 'comments-section';
  commSec.innerHTML = '<h4>Komentarze</h4>';
  const clist = document.createElement('div');
  clist.id = 'clist-' + id;
  clist.innerHTML = '<p style="font-size:11px;color:var(--text-muted);margin-bottom:6px">Brak komentarzy</p>';
  commSec.appendChild(clist);

  const inputRow = document.createElement('div');
  inputRow.className = 'comment-input-row';
  const ta = document.createElement('textarea');
  ta.className = 'comment-input';
  ta.placeholder = 'Dodaj komentarz...';
  ta.rows = 1;
  const btnC = document.createElement('button');
  btnC.className = 'btn-comment';
  btnC.textContent = 'Dodaj';
  btnC.onclick = () => addComment(id, ta);
  inputRow.appendChild(ta);
  inputRow.appendChild(btnC);
  commSec.appendChild(inputRow);
  body.appendChild(commSec);

  card.appendChild(body);
  return card;
}

// ── FIRESTORE REALTIME ────────────────────────────────────────────────────────
function subscribeToQuestion(id, q) {
  if (unsubscribers[id]) unsubscribers[id]();
  const unsub = db.collection('questions').doc(id)
    .onSnapshot(doc => {
      const data = doc.exists ? doc.data() : { votes: {}, comments: [] };
      updateCardUI(id, q, data);
      updateStats();
      document.getElementById('sync-dot').classList.remove('off');
    }, err => {
      console.error(err);
      document.getElementById('sync-dot').classList.add('off');
    });
  unsubscribers[id] = unsub;
}

function updateCardUI(id, q, data) {
  const votes = data.votes || {};
  const comments = data.comments || [];
  const myVote = votes[currentUser];
  const hasVoted = myVote !== undefined;

  // Status row
  const statusRow = document.getElementById('status-' + id);
  if (statusRow) {
    statusRow.innerHTML = '';
    if (hasVoted) {
      const tag = document.createElement('span');
      tag.className = 'answered-tag';
      tag.textContent = '✓ ' + LETTERS[myVote] + ') odpowiedziałem';
      statusRow.appendChild(tag);
    }
    Object.entries(votes).forEach(([user, ans]) => {
      const dot = document.createElement('div');
      dot.className = 'status-dot';
      dot.style.background = getUserColor(user);
      dot.title = `${user}: ${LETTERS[ans]}`;
      statusRow.appendChild(dot);
    });
  }

  // Answer buttons highlight
  const card = document.getElementById('card-' + id);
  if (card) {
    card.querySelectorAll('.answer-btn').forEach(btn => {
      btn.classList.toggle('selected-mine', hasVoted && parseInt(btn.dataset.idx) === myVote);
    });

    // Breakdown
    const breakdown = document.getElementById('breakdown-' + id);
    if (breakdown) {
      if (hasVoted) {
        breakdown.classList.add('visible');
        renderBreakdown(breakdown, q, votes);
      }
    }

    // Comments
    const clist = document.getElementById('clist-' + id);
    if (clist) renderCommentList(clist, comments);
  }
}

function renderBreakdown(el, q, votes) {
  const total = Object.keys(votes).length;
  el.innerHTML = `<h4>Głosy (${total} osób)</h4>`;
  q.answers.forEach((ans, idx) => {
    const voters = Object.entries(votes).filter(([,v])=>v===idx);
    const pct = total > 0 ? Math.round(voters.length/total*100) : 0;
    const row = document.createElement('div');
    row.className = 'vote-row';
    row.innerHTML = `<div class="vote-row-top">
      <span class="vote-lbl">${LETTERS[idx]})</span>
      <div class="vote-bar-wrap"><div class="vote-bar" style="width:${pct}%"></div></div>
      <span class="vote-count">${voters.length > 0 ? voters.length+' ('+pct+'%)' : '–'}</span>
    </div>`;
    if (voters.length > 0) {
      const dotRow = document.createElement('div');
      dotRow.className = 'voter-dots';
      voters.forEach(([user]) => {
        const d = document.createElement('div');
        d.className = 'voter-dot';
        d.style.background = getUserColor(user);
        d.title = user;
        d.textContent = initials(user);
        dotRow.appendChild(d);
      });
      row.appendChild(dotRow);
    }
    el.appendChild(row);
  });
}

function renderCommentList(el, comments) {
  if (!comments || comments.length === 0) {
    el.innerHTML = '<p style="font-size:11px;color:var(--text-muted);margin-bottom:6px">Brak komentarzy</p>';
    return;
  }
  el.innerHTML = '';
  comments.forEach(c => {
    const item = document.createElement('div');
    item.className = 'comment-item';
    const av = document.createElement('div');
    av.className = 'comment-avatar';
    av.style.background = c.color || getUserColor(c.user);
    av.textContent = initials(c.user);
    const bubble = document.createElement('div');
    bubble.className = 'comment-bubble';
    bubble.innerHTML = `<div class="comment-meta">${c.user}</div><div>${c.text}</div>`;
    item.appendChild(av);
    item.appendChild(bubble);
    el.appendChild(item);
  });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function castVote(id, ansIdx, q) {
  try {
    await db.collection('questions').doc(id).set({
      [`votes.${currentUser}`]: ansIdx
    }, { merge: true });
  } catch(e) { console.error('Błąd głosowania:', e); }
}

async function addComment(id, ta) {
  const txt = ta.value.trim();
  if (!txt) return;
  ta.value = '';
  try {
    const docRef = db.collection('questions').doc(id);
    const doc = await docRef.get();
    const existing = doc.exists ? (doc.data().comments || []) : [];
    existing.push({ user: currentUser, color: currentColor, text: txt, ts: Date.now() });
    await docRef.set({ comments: existing }, { merge: true });
  } catch(e) { console.error('Błąd komentarza:', e); }
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  let answered = 0, comments = 0;
  const users = new Set();
  const years = [...new Set(QUESTIONS.map(q=>q.year))];
  years.forEach(year => {
    QUESTIONS.filter(q=>q.year===year).forEach((q, localIdx) => {
      const id = qId(year, localIdx);
      const card = document.getElementById('card-' + id);
      if (!card) return;
      const statusRow = document.getElementById('status-' + id);
      if (statusRow) {
        statusRow.querySelectorAll('.status-dot').forEach(d => {
          if (d.title) users.add(d.title.split(':')[0].trim());
        });
        if (statusRow.querySelector('.answered-tag')) answered++;
      }
      const clist = document.getElementById('clist-' + id);
      if (clist) comments += clist.querySelectorAll('.comment-item').length;
    });
  });
  document.getElementById('stat-answered').textContent = answered;
  document.getElementById('stat-users').textContent = users.size;
  document.getElementById('stat-comments').textContent = comments;
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function filterQuestions() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.q-card').forEach(card => {
    card.style.display = (!q || card.dataset.text.includes(q)) ? '' : 'none';
  });
  document.querySelectorAll('.section-header').forEach(sec => {
    const year = sec.dataset.year;
    const any = [...document.querySelectorAll(`.q-card[data-year="${year}"]`)].some(c=>c.style.display!=='none');
    sec.style.display = any ? '' : 'none';
  });
}
