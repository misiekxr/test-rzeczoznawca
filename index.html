<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egzamin Rzeczoznawcy – Głosowanie</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f1ea;
    --surface: #ffffff;
    --border: #dcd7ce;
    --text: #1a1814;
    --accent: #e74c3c; /* Wyraźny czerwony */
    --accent-bg: #f9ebea;
    --radius: 8px;
  }
  body { font-family: sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
  
  /* LOGOWANIE */
  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--surface); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
  input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid var(--border); border-radius: 6px; font-size: 16px; }
  .btn-primary { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }

  /* APKA */
  #app { display: none; }
  header { background: #2c3e50; color: white; padding: 15px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; }
  main { max-width: 800px; margin: 20px auto; padding: 0 15px; }
  
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: white; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
  .stat-card .num { font-size: 20px; font-weight: bold; display: block; }
  .stat-card .lbl { font-size: 10px; color: #7f8c8d; text-transform: uppercase; }

  .q-card { background: white; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
  .q-header { padding: 15px; cursor: pointer; font-weight: bold; border-bottom: 1px solid #eee; }
  .q-body { padding: 15px; display: none; }
  .q-card.open .q-body { display: block; }

  /* ODPOWIEDZI - TU ZMIANA KOLORU */
  .answer-btn { 
    width: 100%; text-align: left; padding: 12px; margin-bottom: 8px; 
    border: 2px solid var(--border); border-radius: 6px; background: #fafafa; 
    cursor: pointer; font-size: 14px; transition: all 0.2s;
  }
  .answer-btn:hover { background: #f0f0f0; }
  
  /* TO JEST KLASA DLA TWOJEGO WYBORU */
  .answer-btn.selected-mine { 
    border: 3px solid #e74c3c !important; 
    background: #fdf2f2 !important; 
    font-weight: bold;
    box-shadow: 0 0 8px rgba(231, 76, 60, 0.3);
  }

  /* WYNIKI GŁOSOWANIA */
  .vote-breakdown { margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px; border: 1px dashed #ccc; display: none; }
  .vote-breakdown.visible { display: block !important; }
  .vote-bar-row { margin-bottom: 10px; }
  .bar-bg { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 4px 0; }
  .bar-fill { height: 100%; background: #3498db; }
  .voter-dots { display: flex; gap: 4px; margin-top: 4px; }
  .dot { width: 20px; height: 20px; border-radius: 50%; color: white; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

  .answered-tag { background: #27ae60; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-top: 5px; display: inline-block; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>Rzeczoznawca p.poż.</h2>
    <p>Wybierz siebie lub wpisz imię</p>
    <div id="existing-users" style="margin-bottom: 15px;"></div>
    <input type="text" id="name-input" placeholder="Twoje imię">
    <button class="btn-primary" onclick="login()">ZACZNIJ TEST</button>
  </div>
</div>

<div id="app">
  <header>
    <span>Egzamin 2024/25</span>
    <span id="user-info"></span>
  </header>
  <main>
    <div class="stats-grid">
      <div class="stat-card"><span class="num" id="s-total">0</span><span class="lbl">Pytań</span></div>
      <div class="stat-card"><span class="num" id="s-mine">0</span><span class="lbl">Moje</span></div>
      <div class="stat-card"><span class="num" id="s-users">0</span><span class="lbl">Osób</span></div>
      <div class="stat-card"><span class="num" id="s-comm">0</span><span class="lbl">Kom.</span></div>
    </div>
    <div id="container"></div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC4LLDV4Avt4bDp74tNF97jASQPpQZZR4A",
  authDomain: "test-rzeczoznawca.firebaseapp.com",
  projectId: "test-rzeczoznawca",
  storageBucket: "test-rzeczoznawca.firebasestorage.app",
  messagingSenderId: "817646582037",
  appId: "1:817646582037:web:c1c80185b0deba49d7911c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const QUESTIONS = [
  { id: '2025_0', text: 'Nieizolowane termicznie i akustycznie elastyczne przewody wentylacyjne...', answers: ['niepalnych','niezapalnych','trudno zapalnych'] },
  { id: '2025_1', text: 'Zgodnie z PN-B 02877-4:2025-07, efektywna powierzchnia otworów...', answers: ['łączna wymagana pow.','łączna pow. geometryczna','130 % łącznej pow.'] }
  // ... dopisz resztę pytań tutaj
];

let currentUser = "";
const LETTERS = ['a', 'b', 'c'];

function getColor(name) {
  const colors = ['#e67e22','#2ecc71','#3498db','#9b59b6','#f1c40f'];
  let h = 0; for(let i=0; i<name.length; i++) h += name.charCodeAt(i);
  return colors[h % colors.length];
}

async function login() {
  currentUser = document.getElementById('name-input').value.trim();
  if(!currentUser) return;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-info').textContent = currentUser;
  render();
}

function render() {
  const cont = document.getElementById('container');
  cont.innerHTML = '';
  document.getElementById('s-total').textContent = QUESTIONS.length;

  QUESTIONS.forEach(q => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'card-' + q.id;
    card.innerHTML = `
      <div class="q-header" onclick="this.parentElement.classList.toggle('open')">
        ${q.text}
        <div id="status-${q.id}"></div>
      </div>
      <div class="q-body">
        ${q.answers.map((a, i) => `<button class="answer-btn" data-idx="${i}" onclick="vote('${q.id}', ${i}, event)">${LETTERS[i]}) ${a}</button>`).join('')}
        <div class="vote-breakdown" id="breakdown-${q.id}"></div>
      </div>
    `;
    cont.appendChild(card);
    
    // Słuchaj zmian w bazie na żywo
    db.collection('questions').doc(q.id).onSnapshot(doc => {
      if(doc.exists) updateUI(q.id, doc.data());
    });
  });
}

function updateUI(id, data) {
  const votes = data.votes || {};
  const myVote = votes[currentUser];
  const card = document.getElementById('card-' + id);
  const breakDiv = document.getElementById('breakdown-' + id);
  const statDiv = document.getElementById('status-' + id);

  // 1. Zaznacz moją odpowiedź KOLOREM
  card.querySelectorAll('.answer-btn').forEach(btn => {
    const idx = parseInt(btn.dataset.idx);
    btn.classList.toggle('selected-mine', myVote === idx);
  });

  // 2. Pokaż tag "Odpowiedziałem"
  if(myVote !== undefined) {
    statDiv.innerHTML = `<span class="answered-tag">✓ Twoja odp: ${LETTERS[myVote]}</span>`;
    breakDiv.classList.add('visible'); // WYMUSZENIE WIDOCZNOŚCI WYNIKÓW
    
    // 3. Renderuj kto jak głosował
    const total = Object.keys(votes).length;
    let html = `<h4>Wyniki grupy (${total} osób):</h4>`;
    
    [0,1,2].forEach(i => {
      const voters = Object.entries(votes).filter(v => v[1] === i).map(v => v[0]);
      const pct = total > 0 ? (voters.length / total * 100) : 0;
      html += `
        <div class="vote-bar-row">
          <div style="font-size:11px">${LETTERS[i]}) ${voters.length} osób</div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
          <div class="voter-dots">
            ${voters.map(v => `<div class="dot" style="background:${getColor(v)}" title="${v}">${v[0].toUpperCase()}</div>`).join('')}
          </div>
        </div>
      `;
    });
    breakDiv.innerHTML = html;
  }
}

async function vote(id, idx, e) {
  e.stopPropagation();
  // Zapisz do bazy
  await db.collection('questions').doc(id).set({
    [`votes.${currentUser}`]: idx
  }, { merge: true });
}

// Ładowanie osób na start
db.collection('questions').get().then(snap => {
  const users = new Set();
  snap.forEach(doc => {
    const v = doc.data().votes;
    if(v) Object.keys(v).forEach(u => users.add(u));
  });
  const cont = document.getElementById('existing-users');
  users.forEach(u => {
    const b = document.createElement('button');
    b.className = 'btn-primary';
    b.style.width = 'auto'; b.style.margin = '3px'; b.style.padding = '5px 10px';
    b.textContent = u;
    b.onclick = () => { document.getElementById('name-input').value = u; login(); };
    cont.appendChild(b);
  });
});
</script>
</body>
</html>
